version: "3.9"

services:
  # ── 后端 API ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: paim-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - FAISS_INDEX_PATH=/app/data/vectors/faiss_index
      - METADATA_DB_PATH=/app/data/memories.db
    volumes:
      - paim-data:/app/data           # 持久化向量库 + SQLite + 加密 Token
    ports:
      - "8000:8000"                   # 可选：直接访问 API 文档
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ── 前端 (nginx) ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE=/api
    container_name: paim-frontend
    restart: unless-stopped
    ports:
      - "5173:80"                     # http://localhost:5173
    depends_on:
      backend:
        condition: service_healthy

volumes:
  paim-data:
    name: personal-ai-memory-data
